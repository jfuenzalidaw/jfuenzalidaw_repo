name: Yosemite Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types:
      - yosemite-monitor
  workflow_dispatch:
    inputs:
      monitoring_cycles:
        description: "Manual-run monitoring cycles. Scheduled runs always use 20 cycles."
        required: false
        default: "1"
      continue_monitoring:
        description: "Dispatch the next monitoring run when this one finishes."
        required: false
        default: "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: yosemite-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      CONTINUE_MONITORING: ${{ github.event_name == 'schedule' && 'true' || inputs.continue_monitoring || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GERONIMO_TELEGRAM_CHAT_ID: ${{ secrets.GERONIMO_TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOPHIA_TELEGRAM_BOT_TOKEN: ${{ secrets.SOPHIA_TELEGRAM_BOT_TOKEN }}
          SOPHIA_TELEGRAM_CHAT_ID: ${{ secrets.SOPHIA_TELEGRAM_CHAT_ID }}
          MONITORING_CYCLES: ${{ github.event_name == 'workflow_dispatch' && inputs.monitoring_cycles || github.event_name == 'repository_dispatch' && '8' || '20' }}
          MONITORING_INTERVAL_SECONDS: "15"
        run: |
          for cycle in $(seq 1 "$MONITORING_CYCLES"); do
            cycle_start=$(date +%s)
            echo "Monitoring cycle ${cycle}/${MONITORING_CYCLES}"
            python cloud_monitor.py
            if [ "$cycle" -lt "$MONITORING_CYCLES" ]; then
              elapsed=$(($(date +%s) - cycle_start))
              sleep_seconds=$((MONITORING_INTERVAL_SECONDS - elapsed))
              if [ "$sleep_seconds" -gt 0 ]; then
                sleep "$sleep_seconds"
              fi
            fi
          done

      - name: Save monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .monitor_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Yosemite monitor state"
            git pull --rebase origin main
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              if [ "$attempt" = "3" ]; then
                echo "Failed to push monitor state after 3 attempts."
                exit 1
              fi
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                git pull --rebase origin main
              fi
              sleep 2
            done
          fi

      - name: Dispatch next monitoring run
        if: ${{ always() && env.CONTINUE_MONITORING == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.CAMPSITE_GH_WORKFLOW_PAT || secrets.GH_WORKFLOW_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "No workflow PAT configured; skipping self-dispatch."
            exit 0
          fi
          gh workflow run yosemite-monitor.yml \
            --ref main \
            -f monitoring_cycles=20 \
            -f continue_monitoring=true
