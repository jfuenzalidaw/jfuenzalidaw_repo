name: Yosemite Monitor

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - yosemite-monitor

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: yosemite-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRON_JOB_ORG_API_KEY: ${{ secrets.CRON_JOB_ORG_API_KEY }}
          CRON_JOB_ORG_JOB_ID: "7604120"
        run: python cloud_monitor.py

      - name: Save monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .monitor_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Yosemite monitor state"
            git pull --rebase origin main
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              if [ "$attempt" = "3" ]; then
                echo "Failed to push monitor state after 3 attempts."
                exit 1
              fi
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                git pull --rebase origin main
              fi
              sleep 2
            done
          fi
